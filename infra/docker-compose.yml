version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: ai-learning-postgres
    environment:
      POSTGRES_DB: ai_learning
      POSTGRES_USER: ai_learning
      POSTGRES_PASSWORD: ai_learning
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7.4
    container_name: ai-learning-redis
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    container_name: ai-learning-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ai_learning
      MINIO_ROOT_PASSWORD: ai_learning_secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

volumes:
  postgres-data:
  minio-data: